name: doc_parse
description: Document parsing workflow using multimodal intelligence
version: 1.0.0

steps:
  - name: load_document
    action: read_file
    inputs:
      path: "${document_path}"
    outputs:
      document: doc_content
  
  - name: parse_document
    agent: product
    inputs:
      document: "${load_document.document}"
      type: "${document_type}"
    outputs:
      parsed: parsed_data
  
  - name: validate_output
    action: validate_json
    inputs:
      data: "${parse_document.parsed}"
    outputs:
      valid: validation_result

error_handling:
  retry_count: 2
  on_failure: log_error
