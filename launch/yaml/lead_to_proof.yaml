name: lead_to_proof
description: Hunter agent workflow: find leads, analyze, draft, and generate proof
version: 1.0.0

steps:
  - name: hunt_leads
    agent: hunter
    inputs:
      keyword: "${keyword}"
      limit: "${limit}"
    outputs:
      leads: leads_data
  
  - name: analyze_leads
    agent: product
    inputs:
      leads: "${hunt_leads.leads}"
    outputs:
      analysis: analysis_data
  
  - name: draft_emails
    agent: hunter
    inputs:
      analysis: "${analyze_leads.analysis}"
    outputs:
      emails: email_drafts
  
  - name: generate_proof
    agent: product
    inputs:
      leads: "${hunt_leads.leads}"
      proof: true
    outputs:
      proofs: proof_documents

error_handling:
  retry_count: 3
  on_failure: notify_user
